<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>留学生期末复习助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1 class="title">留学生期末复习助手</h1>
        <p class="subtitle">
          在浏览器中提取 PDF / PPTX 文字后发送给 DeepSeek，生成中文考点、难点与练习题（无大文件上传，适配
          Vercel 等部署）
        </p>
      </header>

      <main class="card">
        <ul class="flash-list" id="flash-list" role="status" aria-live="polite"></ul>

        <form
          class="upload-form"
          id="analyze-form"
          data-max-chars="{{ max_chars }}"
          data-api-url="{{ url_for('api_analyze') }}"
        >
          <label class="file-label">
            <span class="file-label__text">选择 PDF 或 PPTX 文件（在本地解析，仅上传文字）</span>
            <input
              class="file-input"
              type="file"
              id="material-file"
              accept=".pdf,.pptx,application/pdf,application/vnd.openxmlformats-officedocument.presentationml.presentation"
              required
            />
          </label>
          <button class="btn btn--primary" type="submit">提取文字并分析</button>
        </form>

        <section class="result" id="result-section" aria-live="polite" hidden>
          <h2 class="result__title">来源文件</h2>
          <p class="result__filename" id="source-filename"></p>
        </section>

        <section class="analysis" id="analysis-section" aria-label="AI 复习内容" hidden></section>
      </main>

      <footer class="footer">
        使用 DeepSeek（deepseek-chat）；请在环境变量 DEEPSEEK_API_KEY 中配置密钥。旧版 .ppt
        请先在本地转为 PDF 或 PPTX。大文件仅在浏览器中读取，提交给服务器的仅为纯文本。
      </footer>
    </div>
    <script type="module" src="{{ url_for('static', filename='js/analyze.js') }}"></script>
  </body>
</html>
